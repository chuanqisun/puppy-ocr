<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>" />
    <title>Puppy OCR</title>
  </head>
  <body>
    <main>
      <h1>Puppy OCR</h1>

      <label for="api-key">API key</label>
      <input id="api-key" name="apiKey" type="password" autocomplete="off" />

      <label for="pdf-file">PDF file</label>
      <input id="pdf-file" name="file" type="file" accept="application/pdf" />

      <details>
        <summary>Settings</summary>
        <label class="setting-option" for="setting-use-doc-orientation-classify">
          <input id="setting-use-doc-orientation-classify" type="checkbox" />
          <span class="setting-copy"><strong>Fix orientation</strong>: detect and correct images at 0°, 90°, 180°, and 270°</span>
        </label>
        <label class="setting-option" for="setting-use-doc-unwarping">
          <input id="setting-use-doc-unwarping" type="checkbox" checked />
          <span class="setting-copy"><strong>Fix distortion</strong>: correct distorted images, such as folds, tilting, warping</span>
        </label>
        <label class="setting-option" for="setting-use-layout-detection">
          <input id="setting-use-layout-detection" type="checkbox" checked />
          <span class="setting-copy"
            ><strong>Complex layout</strong>: segment and sort the document layout, then recognize content by region type. If your document contains only one
            type of element-text, table, formula, or chart-you can disable this option for direct recognition</span
          >
        </label>
      </details>

      <button id="start-ocr" type="button" disabled>Start OCR</button>

      <div id="result" hidden></div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
