<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>life.config</title>
    <style>
      :root {
        --color-page-bg: rgb(0 0 0);
        --color-text: rgb(255 255 255);
        --color-text-muted: rgb(255 255 255 / 0.62);
        --color-text-soft: rgb(255 255 255 / 0.8);
        --color-text-strong: rgb(255 255 255 / 0.82);
        --color-panel-bg: rgb(255 255 255 / 0.04);
        --color-panel-bg-strong: rgb(255 255 255 / 0.06);
        --color-panel-bg-soft: rgb(255 255 255 / 0.03);
        --color-border-soft: rgb(255 255 255 / 0.12);
        --color-border: rgb(255 255 255 / 0.15);
        --color-border-strong: rgb(255 255 255 / 0.18);
        --color-grid-line: rgb(255 255 255 / 0.05);
        --color-mask-solid: rgb(0 0 0 / 1);
        --color-mask-fade: rgb(0 0 0 / 0.12);
        --color-surface-inverse: rgb(255 255 255);
        --color-text-inverse: rgb(0 0 0);
        --font-ui: Inter, system-ui, sans-serif;
        --radius-panel: 14px;
        --radius-control: 10px;
        --radius-tight: 8px;
        --radius-segmented: 11px;
        --space-panel-offset: 14px;
        --space-panel-padding: 12px;
        --space-field: 10px;
        --space-field-tight: 6px;
        --space-inline: 8px;
        --space-inline-wide: 12px;
        --space-button-y: 9px;
        --space-button-x: 10px;
        --control-height: 2px;
        --thumb-size: 12px;
        --panel-width: 260px;
        --panel-collapsed-opacity: 0.5;
        --panel-blur: 10px;
        --transition-panel: 180ms ease;
        --transition-overlay: var(--snapshot-overlay-fade-in-ms, 250ms) ease;
        --grid-size: 32px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--color-page-bg);
        color: var(--color-text);
        font-family: var(--font-ui);
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
      }

      .scene-grid {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image: linear-gradient(var(--color-grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--color-grid-line) 1px, transparent 1px);
        background-size: var(--grid-size) var(--grid-size);
        -webkit-mask-image: radial-gradient(circle at center, var(--color-mask-solid), var(--color-mask-fade) 72%, transparent 100%);
        mask-image: radial-gradient(circle at center, var(--color-mask-solid), var(--color-mask-fade) 72%, transparent 100%);
      }

      .panel-shell {
        position: fixed;
        top: var(--space-panel-offset);
        left: var(--space-panel-offset);
        z-index: 10;
      }

      .panel {
        width: var(--panel-width);
        background: var(--color-panel-bg);
        border: 1px solid var(--color-border-soft);
        border-radius: var(--radius-panel);
        padding: var(--space-panel-padding);
        backdrop-filter: blur(var(--panel-blur));
        transition: opacity var(--transition-panel), transform var(--transition-panel);
      }

      .panel-shell.collapsed .panel {
        width: auto;
        padding: 0;
        background: transparent;
        border-color: transparent;
        backdrop-filter: none;
      }

      .panel-shell.collapsed .panel > :not(.panel-header) {
        display: none;
      }

      .panel-shell.collapsed .panel-header {
        margin-bottom: 0;
      }

      .panel-shell.collapsed .panel-title {
        display: none;
      }

      .panel-shell.collapsed .button-ghost {
        opacity: var(--panel-collapsed-opacity);
        transform: translateX(0);
        transition: opacity var(--transition-panel);
      }

      .panel-shell.collapsed .button-ghost:hover {
        opacity: 1;
      }

      .panel-header,
      .field-header,
      .choice-list,
      .choice-list label {
        display: flex;
        align-items: center;
      }

      .panel-header,
      .field-header {
        justify-content: space-between;
      }

      .panel-header {
        margin-bottom: var(--space-field-tight);
      }

      .panel-title {
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      button,
      input[type="password"] {
        border-radius: var(--radius-control);
        font-size: 12px;
      }

      button {
        flex: 1;
        padding: var(--space-button-y) var(--space-button-x);
        border: none;
        background: var(--color-surface-inverse);
        color: var(--color-text-inverse);
        cursor: pointer;
      }

      .button-ghost,
      .segment-button {
        background: transparent;
        color: var(--color-text-soft);
      }

      .button-ghost {
        flex: 0 0 auto;
        width: auto;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-tight);
        padding: 4px 8px;
        font-size: 11px;
      }

      .field,
      .choice-group,
      .key-field {
        margin: var(--space-field) 0;
      }

      .key-field {
        margin-bottom: var(--space-field-tight);
      }

      .field-header,
      .choice-group,
      .key-field label,
      .status {
        font-size: 11px;
      }

      .field-header,
      .key-field label {
        margin-bottom: 4px;
      }

      .mode-switcher {
        margin: 12px 0 10px;
      }

      .segmented-control {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0;
        border: 1px solid var(--color-border-strong);
        border-radius: var(--radius-segmented);
        overflow: hidden;
        background: var(--color-panel-bg-soft);
      }

      .segment-button {
        flex: initial;
        border-radius: 0;
        border: 0;
        border-right: 1px solid var(--color-border);
        color: var(--color-text-strong);
      }

      .segment-button:last-child {
        border-right: 0;
      }

      .segment-button.active {
        background: var(--color-surface-inverse);
        color: var(--color-text-inverse);
      }

      .choice-list {
        gap: var(--space-inline-wide);
        flex-wrap: wrap;
      }

      .choice-list label {
        gap: 5px;
        cursor: pointer;
      }

      input[type="range"] {
        width: 100%;
        appearance: none;
        height: var(--control-height);
        background: var(--color-border-strong);
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: var(--thumb-size);
        height: var(--thumb-size);
        border-radius: 50%;
        border: none;
        background: var(--color-surface-inverse);
        cursor: pointer;
      }

      input[type="checkbox"],
      input[type="radio"] {
        cursor: pointer;
      }

      input[type="password"] {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--color-border);
        background: var(--color-panel-bg-strong);
        color: var(--color-text);
      }

      .status {
        margin-top: 10px;
        color: var(--color-text-muted);
        min-height: 1.2em;
      }

      .snapshot-overlay {
        position: fixed;
        inset: 0;
        z-index: 6;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-overlay);
        background: var(--color-page-bg);
      }

      .snapshot-overlay.no-transition {
        transition: none;
      }

      .snapshot-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .snapshot-overlay img {
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        max-height: 100vh;
        object-fit: cover;
        object-position: center;
        background: var(--color-page-bg);
      }
    </style>
  </head>
  <body>
    <div class="scene-grid"></div>

    <div id="snapshotOverlay" class="snapshot-overlay">
      <img id="snapshotImage" alt="AI generated morphology preview" />
    </div>

    <div id="uiShell" class="panel-shell">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">life.config</div>
          <button id="hideBtn" class="button-ghost">Hide</button>
        </div>

        <div class="key-field">
          <label for="apiKey">Replicate API Key</label>
          <input id="apiKey" type="password" placeholder="Enter Replicate API key" autocomplete="off" spellcheck="false" />
        </div>

        <div class="field">
          <div class="field-header"><span>Symmetry Order</span><span id="orderVal">6.00</span></div>
          <input id="order" type="range" min="1" max="8" step="0.01" value="6.00" />
        </div>

        <div class="field">
          <div class="field-header"><span>Warp</span><span id="warpVal">1.20</span></div>
          <input id="warp" type="range" min="0" max="3" step="0.01" value="1.20" />
        </div>

        <div class="field">
          <div class="field-header"><span>Fold</span><span id="foldVal">0.68</span></div>
          <input id="fold" type="range" min="0" max="1.6" step="0.01" value="0.68" />
        </div>

        <div class="field">
          <div class="field-header"><span>Spike</span><span id="spikeVal">0.00</span></div>
          <input id="spike" type="range" min="0" max="0.5" step="0.01" value="0.00" />
        </div>

        <div class="field">
          <div class="field-header"><span>Symmetry</span><span id="chaosVal">0.22</span></div>
          <input id="chaos" type="range" min="0" max="1.2" step="0.01" value="0.22" />
        </div>

        <button id="randomizeBtn" class="panel-action-button" type="button">Randomize</button>

        <div class="choice-group">
          <span>Render Mode</span>
          <div class="choice-list">
            <label><input type="radio" name="renderMode" value="point" checked /> Point</label>
            <label><input type="radio" name="renderMode" value="mesh" /> Mesh</label>
            <label><input type="radio" name="renderMode" value="solid" /> Solid</label>
          </div>
        </div>

        <div class="choice-group">
          <span>Style</span>
          <div class="choice-list">
            <label><input type="radio" name="renderStyle" value="mineral" checked /> Mineral</label>
            <label><input type="radio" name="renderStyle" value="organ" /> Organ</label>
            <label><input type="radio" name="renderStyle" value="flora" /> Flora</label>
            <label><input type="radio" name="renderStyle" value="liquid" /> Liquid</label>
            <label><input type="radio" name="renderStyle" value="ribbon" /> Ribbon</label>
          </div>
        </div>

        <div class="mode-switcher">
          <div class="segmented-control" role="group" aria-label="Render mode">
            <button id="modeManual" class="segment-button active" type="button" data-mode="manual" aria-pressed="true">Manual</button>
            <button id="modePreview" class="segment-button" type="button" data-mode="preview" aria-pressed="false">Preview</button>
            <button id="modeDemo" class="segment-button" type="button" data-mode="demo" aria-pressed="false">Demo</button>
          </div>
        </div>

        <div id="status" class="status"></div>
      </div>
    </div>
    <script type="module" src="/src/main-page.js"></script>

    <script type="module"></script>
  </body>
</html>
