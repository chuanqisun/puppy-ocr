<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>" />
    <title>Puppy OCR</title>
  </head>
  <body>
    <main>
      <h1>Puppy OCR</h1>

      <label for="api-key">API key</label>
      <input id="api-key" name="apiKey" type="password" autocomplete="off" />

      <label for="pdf-file">PDF file</label>
      <input id="pdf-file" name="file" type="file" accept="application/pdf" />

      <p id="selected-file">No file selected.</p>

      <button id="start-ocr" type="button" disabled>Start OCR</button>

      <p id="status" aria-live="polite">Select a PDF to begin.</p>

      <h2>Result</h2>
      <div id="result"></div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
