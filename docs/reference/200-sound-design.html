<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Cinematic Sound Design</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #08090e;
        color: #c8cde0;
        font: 14px/1.5 system-ui, sans-serif;
      }
      .panel {
        width: min(600px, 92vw);
        background: #0e1018;
        border: 1px solid #1a1e2e;
        border-radius: 14px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        color: #e2e6f0;
      }
      p {
        margin: 0 0 18px;
        color: #6b7394;
        font-size: 13px;
      }
      .btns {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
        background: #1c2038;
        color: #c8cde0;
      }
      button:hover {
        background: #282e4a;
      }
      button.primary {
        background: #3b4270;
        color: #e8ecff;
      }
      button.stop {
        background: #4a2030;
        color: #fca5a5;
      }
      .row {
        display: grid;
        grid-template-columns: 100px 1fr 44px;
        gap: 10px;
        align-items: center;
        margin: 6px 0;
      }
      input[type="range"] {
        width: 100%;
        accent-color: #6b7394;
      }
      .val {
        color: #6b7394;
        font-size: 12px;
        text-align: right;
      }
      .status {
        margin-top: 14px;
        color: #4a5070;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Dark Cinematic Sound Design</h1>
      <p>Morph → Hold → Reveal → Hold → Repeat</p>

      <div class="btns">
        <button class="primary" id="bLoop">Start Loop</button>
        <button id="bOnce">Play Once</button>
        <button class="stop" id="bStop">Stop</button>
        <button id="bMorph">Morph</button>
        <button id="bReveal">Reveal</button>
      </div>

      <div class="row">
        <label>Volume</label><input id="vol" type="range" min="0" max="1" step=".01" value="0.7" />
        <div class="val" id="volV">0.70</div>
      </div>
      <div class="row">
        <label>Darkness</label><input id="dark" type="range" min="0.5" max="2" step=".01" value="1.0" />
        <div class="val" id="darkV">1.00</div>
      </div>
      <div class="row">
        <label>Tempo</label><input id="tempo" type="range" min="0.6" max="1.4" step=".01" value="1.0" />
        <div class="val" id="tempoV">1.00</div>
      </div>

      <div class="status" id="st">Ready</div>
    </div>

    <script>
      const AC = window.AudioContext || window.webkitAudioContext;
      let ctx,
        masterGain,
        compressor,
        convolver,
        loopId = null;

      const $ = (id) => document.getElementById(id);
      function val(id) {
        return +$(id).value;
      }

      ["vol", "dark", "tempo"].forEach((id) => {
        $(id).addEventListener("input", () => {
          $(id + "V").textContent = val(id).toFixed(2);
          if (masterGain) masterGain.gain.value = val("vol");
        });
      });

      function makeIR(duration, decay) {
        const len = ctx.sampleRate * duration;
        const buf = ctx.createBuffer(2, len, ctx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = buf.getChannelData(ch);
          for (let i = 0; i < len; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
          }
        }
        return buf;
      }

      async function init() {
        if (ctx) return;
        ctx = new AC();

        masterGain = ctx.createGain();
        masterGain.gain.value = val("vol");

        compressor = ctx.createDynamicsCompressor();
        compressor.threshold.value = -14;
        compressor.ratio.value = 10;
        compressor.attack.value = 0.003;
        compressor.release.value = 0.25;

        convolver = ctx.createConvolver();
        convolver.buffer = makeIR(4.0, 1.8);

        const wet = ctx.createGain();
        wet.gain.value = 0.2;
        const dry = ctx.createGain();
        dry.gain.value = 0.8;

        masterGain.connect(dry).connect(compressor);
        masterGain.connect(convolver).connect(wet).connect(compressor);
        compressor.connect(ctx.destination);
      }

      // ─── MORPH: slow dread, machinery waking ───

      function morph(at, dur, darkness) {
        const bus = ctx.createGain();
        bus.gain.setValueAtTime(0.0001, at);
        bus.gain.exponentialRampToValueAtTime(0.6, at + dur * 0.3);
        bus.gain.setValueAtTime(0.6, at + dur * 0.8);
        bus.gain.exponentialRampToValueAtTime(0.0001, at + dur);
        bus.connect(masterGain);

        const lp = ctx.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.setValueAtTime(200, at);
        lp.frequency.exponentialRampToValueAtTime(600 * darkness, at + dur * 0.7);
        lp.frequency.exponentialRampToValueAtTime(150, at + dur);
        lp.Q.value = 1.5;
        lp.connect(bus);

        const f0 = 58.27;

        const s1 = ctx.createOscillator();
        s1.type = "sawtooth";
        s1.frequency.value = f0;
        s1.detune.value = -12;

        const s2 = ctx.createOscillator();
        s2.type = "sawtooth";
        s2.frequency.value = f0;
        s2.detune.value = 15;

        const s3 = ctx.createOscillator();
        s3.type = "sawtooth";
        s3.frequency.value = f0 / 2;
        s3.detune.value = -6;

        const sGain = ctx.createGain();
        sGain.gain.value = 0.12 * darkness;
        s1.connect(sGain);
        s2.connect(sGain);
        s3.connect(sGain);
        sGain.connect(lp);

        const sub = ctx.createOscillator();
        sub.type = "sine";
        sub.frequency.value = f0 / 2;
        const subG = ctx.createGain();
        subG.gain.value = 0.25 * darkness;
        sub.connect(subG).connect(lp);

        const lfo = ctx.createOscillator();
        lfo.type = "sine";
        lfo.frequency.setValueAtTime(0.4, at);
        lfo.frequency.linearRampToValueAtTime(2.5, at + dur);
        const lfoG = ctx.createGain();
        lfoG.gain.value = 0.04 * darkness;
        lfo.connect(lfoG).connect(bus.gain);

        [s1, s2, s3, sub, lfo].forEach((o) => {
          o.start(at);
          o.stop(at + dur + 0.1);
        });
      }

      // ─── REVEAL: evolved from morph — same DNA but more voices, ───
      // wider detune, tritone dissonance, deeper sub, filter opens further,
      // and a slow pitch descent that creates dread gravity

      function reveal(at, dur, darkness) {
        const tail = 2.2;
        const total = dur + tail;

        const bus = ctx.createGain();
        bus.connect(masterGain);

        // Swell like the morph but bigger, more sustained
        bus.gain.setValueAtTime(0.0001, at);
        bus.gain.exponentialRampToValueAtTime(0.9, at + total * 0.25);
        bus.gain.setValueAtTime(0.9, at + total * 0.7);
        bus.gain.exponentialRampToValueAtTime(0.0001, at + total);

        // Filter opens wider than morph — reveals more harmonic content
        const lp = ctx.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.setValueAtTime(120, at);
        lp.frequency.exponentialRampToValueAtTime(900 * darkness, at + total * 0.5);
        lp.frequency.exponentialRampToValueAtTime(100, at + total);
        lp.Q.value = 2.0;
        lp.connect(bus);

        // Same root family as morph but dropped an octave
        const f0 = 29.14; // Bb0

        // More voice pairs than morph, wider detune spread
        const partials = [
          { ratio: 1, vol: 0.28, type: "sawtooth" },
          { ratio: 2, vol: 0.18, type: "sawtooth" },
          { ratio: 3, vol: 0.1, type: "sawtooth" },
          { ratio: 4, vol: 0.05, type: "triangle" },
        ];

        partials.forEach((p, i) => {
          const freq = f0 * p.ratio;
          const g = ctx.createGain();
          g.gain.value = p.vol * darkness;
          g.connect(lp);

          // Wider detune than morph — spreading further over time
          const a = ctx.createOscillator();
          a.type = p.type;
          a.frequency.value = freq;
          a.detune.setValueAtTime(-4, at);
          a.detune.linearRampToValueAtTime(-25 - i * 5, at + total * 0.65);
          a.detune.linearRampToValueAtTime(-12, at + total);

          const b = ctx.createOscillator();
          b.type = p.type;
          b.frequency.value = freq;
          b.detune.setValueAtTime(4, at);
          b.detune.linearRampToValueAtTime(25 + i * 5, at + total * 0.65);
          b.detune.linearRampToValueAtTime(12, at + total);

          a.connect(g);
          b.connect(g);
          a.start(at);
          b.start(at);
          a.stop(at + total + 0.1);
          b.stop(at + total + 0.1);
        });

        // ─── Tritone dissonance layer: E1 against the Bb ───
        // This is the horror interval — creates deep unease
        const tritoneF = 41.2; // E1, tritone from Bb
        const tA = ctx.createOscillator();
        tA.type = "sawtooth";
        tA.frequency.value = tritoneF;
        tA.detune.setValueAtTime(-6, at);
        tA.detune.linearRampToValueAtTime(-20, at + total * 0.6);

        const tB = ctx.createOscillator();
        tB.type = "sawtooth";
        tB.frequency.value = tritoneF;
        tB.detune.setValueAtTime(6, at);
        tB.detune.linearRampToValueAtTime(20, at + total * 0.6);

        const tG = ctx.createGain();
        // Tritone fades in after the main voices establish — creeping horror
        tG.gain.setValueAtTime(0.0001, at);
        tG.gain.exponentialRampToValueAtTime(0.0001, at + total * 0.15);
        tG.gain.exponentialRampToValueAtTime(0.12 * darkness, at + total * 0.5);
        tG.gain.exponentialRampToValueAtTime(0.0001, at + total);
        tA.connect(tG);
        tB.connect(tG);
        tG.connect(lp);
        tA.start(at);
        tB.start(at);
        tA.stop(at + total + 0.1);
        tB.stop(at + total + 0.1);

        // ─── Deeper sub than morph — descending pitch for gravity ───
        const sub = ctx.createOscillator();
        sub.type = "sine";
        sub.frequency.setValueAtTime(f0, at);
        sub.frequency.exponentialRampToValueAtTime(f0 * 0.85, at + total);
        const subG = ctx.createGain();
        subG.gain.setValueAtTime(0.0001, at);
        subG.gain.exponentialRampToValueAtTime(0.45 * darkness, at + total * 0.3);
        subG.gain.exponentialRampToValueAtTime(0.0001, at + total);
        sub.connect(subG).connect(bus); // clean sub bypasses filter
        sub.start(at);
        sub.stop(at + total + 0.1);

        // ─── Slow amplitude tremor — same idea as morph but deeper, slower ───
        // Creates a breathing/pulsing quality like something alive
        const lfo = ctx.createOscillator();
        lfo.type = "sine";
        lfo.frequency.setValueAtTime(0.3, at);
        lfo.frequency.linearRampToValueAtTime(1.8, at + total * 0.7);
        lfo.frequency.linearRampToValueAtTime(0.5, at + total);
        const lfoG = ctx.createGain();
        lfoG.gain.value = 0.06 * darkness;
        lfo.connect(lfoG).connect(bus.gain);
        lfo.start(at);
        lfo.stop(at + total + 0.1);
      }

      // ─── Scheduling ───

      function cycle() {
        const s = val("tempo");
        const d = val("dark");
        const morphDur = 2.0 / s;
        const hold1 = 1.0 / s;
        const revealDur = 0.5 / s;

        const t = ctx.currentTime + 0.05;
        morph(t, morphDur, d);
        reveal(t + morphDur + hold1, revealDur, d);
      }

      async function go(once) {
        await init();
        if (ctx.state === "suspended") await ctx.resume();
        stop(false);
        cycle();
        if (!once) {
          const ms = (2000 + 1000 + 500 + 800) / val("tempo");
          loopId = setInterval(cycle, ms);
          $("st").textContent = "Looping...";
        } else {
          $("st").textContent = "Playing once...";
        }
      }

      function stop(msg = true) {
        if (loopId !== null) {
          clearInterval(loopId);
          loopId = null;
        }
        if (msg) $("st").textContent = "Stopped";
      }

      $("bLoop").onclick = () => go(false);
      $("bOnce").onclick = () => go(true);
      $("bStop").onclick = () => stop();
      $("bMorph").onclick = async () => {
        await init();
        if (ctx.state === "suspended") await ctx.resume();
        morph(ctx.currentTime + 0.02, 2.0 / val("tempo"), val("dark"));
        $("st").textContent = "Morph";
      };
      $("bReveal").onclick = async () => {
        await init();
        if (ctx.state === "suspended") await ctx.resume();
        reveal(ctx.currentTime + 0.02, 0.5 / val("tempo"), val("dark"));
        $("st").textContent = "Reveal";
      };
    </script>
  </body>
</html>
